<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main class="box wide">
      <div class="top-row">
        <h1>Submitted names</h1>
        <form action="/logout" method="post">
          <button type="submit">Logout</button>
        </form>
      </div>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Time</th>
          </tr>
        </thead>
        <tbody>
          {% for entry in entries %}
            <tr>
              <td>{{ entry.id }}</td>
              <td>{{ entry.name }}</td>
              <td>{{ entry.created_at }}</td>
            </tr>
          {% else %}
            <tr>
              <td colspan="3">No names yet.</td>
            </tr>
          {% endfor %}
        </tbody>
      </table>
    </main>
  </body>
</html>
